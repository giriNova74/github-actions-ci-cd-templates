name: Build Pipeline

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build images and generate SBOM
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.REGISTRY_URL }}
      IMAGE_FRONTEND: ${{ secrets.REGISTRY_URL }}/frontend:${{ github.sha }}
      IMAGE_BACKEND: ${{ secrets.REGISTRY_URL }}/backend:${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.multistage
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.multistage
          push: true
          tags: ${{ env.IMAGE_BACKEND }}

      - name: Generate frontend SBOM
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_FRONTEND }}
          format: spdx-json
          output: frontend.spdx.json
          exit-code: 0

      - name: Generate backend SBOM
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_BACKEND }}
          format: spdx-json
          output: backend.spdx.json
          exit-code: 0

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            frontend.spdx.json
            backend.spdx.json
