name: Security Pipeline

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          path: .

  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  security-gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs: [semgrep, gitleaks, trivy-fs, dependency-audit]
    if: ${{ always() }}
    steps:
      - name: Fail if any security stage failed
        run: |
          if [[ "${{ needs.semgrep.result }}" != "success" || "${{ needs.gitleaks.result }}" != "success" || "${{ needs.trivy-fs.result }}" != "success" || "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "One or more security stages failed." >&2
            exit 1
          fi
