name: CI Pipeline

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run ruff
        run: python -m ruff check backend

  backend-tests:
    name: Backend unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect backend tests
        id: detect-backend-tests
        run: |
          if find backend -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install backend dependencies and pytest
        if: steps.detect-backend-tests.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        if: steps.detect-backend-tests.outputs.has_tests == 'true'
        run: python -m pytest backend -q

      - name: Skip backend tests when none are present
        if: steps.detect-backend-tests.outputs.has_tests != 'true'
        run: echo "No backend tests were found; skipping pytest."

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, frontend-tests]
    if: ${{ always() }}
    steps:
      - name: Fail if any CI stage failed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" || "${{ needs.backend-tests.result }}" != "success" || "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "One or more CI stages failed." >&2
            exit 1
          fi
